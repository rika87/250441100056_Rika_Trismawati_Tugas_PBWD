<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Biodata</title>
  </head>
  <bodyz>
    <center>
      <h1>FORM BIODATA</h1>
      <hr />
        <fieldset>
          <form>
            <table cellpadding="5px">
              <tr>
                <th class="label">Nama</th>
                <td>:</td>
                <td>
                  <input
                    class="input"
                    type="text"
                    name="nama"
                    placeholder="Masukkan Nama..."
                  />
                </td>
              </tr>
              <tr>
                <th class="label">Email</th>
                <td>:</td>
                <td>
                  <input
                    class="input"
                    type="email"
                    name="email"
                    placeholder="Masukkan Email..."
                  />
                </td>
              </tr>
              <tr>
                <th class="label">Jenis Kelamin</th>
                <td>:</td>
                <td>
                  <input type="radio" name="jk" /> Laki-laki <br /><input
                    type="radio"
                    name="jk"
                  />
                  Perempuan
                </td>
              </tr>
              <tr>
                <th class="label">Hobi</th>
                <td>:</td>
                <td>
                  <input type="checkbox" name="hobi" /> Volly <br /><input
                    type="checkbox"
                    name="hobi"
                  />
                  Hadrah <br /><input type="checkbox" name="hobi" /> Nyanyi
                  <br /><input type="checkbox" name="hobi" /> Mencintai Kamu
                </td>
              </tr>
              <tr>
                <th class="label">Prodi</th>
                <td>:</td>
                <td>
                  <select class="input">
                    <option>Sistem Informasi</option>
                    <option>Teknik Informatika</option>
                    <option>Teknik Industri</option>
                  </select>
                </td>
              </tr>
              <tr>
                <th class="label">Password</th>
                <td>:</td>
                <td><input class="input" type="password" name="password" /></td>
              </tr>
              <tr>
                <td colspan="2"></td>
                <td><button>Reset</button> <button>Kirim</button></td>
              </tr>
            </table>
          </form>
        </fieldset>
      <hr />

    </center>
  </body>
</html>
